# GitLab Pages deploy for a static, build-less site.
# The `pages` job copies the site into the `public/` artifact, which GitLab
# publishes at https://bodygon.gitlab.io/emanueledambrosio (until a custom
# domain is connected). Runs only on the default branch.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -a index.html favicon.svg robots.txt assets public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
