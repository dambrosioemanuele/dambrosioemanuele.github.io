<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- TODO(launch): remove this noindex once the content is final. -->
    <meta name="robots" content="noindex" />

    <title>Emanuele d'Ambrosio</title>
    <meta name="description" content="" data-i18n-meta="seo.description" />

    <link rel="alternate" hreflang="it" href="./?lang=it" />
    <link rel="alternate" hreflang="en" href="./?lang=en" />
    <link rel="alternate" hreflang="x-default" href="./" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Emanuele d'Ambrosio" />
    <meta property="og:description" content="" data-i18n-meta="seo.description" />

    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a class="brand" href="#top" aria-label="Emanuele d'Ambrosio">ED</a>
      <nav class="lang" aria-label="Language switch">
        <button type="button" data-lang="it">IT</button>
        <span class="lang-sep" aria-hidden="true">/</span>
        <button type="button" data-lang="en">EN</button>
      </nav>
    </header>

    <main id="top">
      <!-- HERO -->
      <section class="hero">
        <img class="hero-portrait" src="./assets/img/emanuele-portrait.jpg" alt="Emanuele d'Ambrosio" width="168" height="168" />
        <p class="eyebrow" data-i18n="hero.eyebrow"></p>
        <h1 class="hero-name" data-i18n="hero.name"></h1>
        <p class="hero-tagline" data-i18n="hero.tagline"></p>
        <p class="hero-intro" data-i18n="hero.intro"></p>
        <div class="cta-row">
          <a class="btn btn-primary" data-link="book" data-i18n="hero.ctaBook" href="#"></a>
          <a class="btn btn-ghost" href="#contact" data-i18n="hero.ctaContact"></a>
        </div>
      </section>

      <!-- ABOUT -->
      <section class="section" id="about">
        <p class="kicker" data-i18n="about.kicker"></p>
        <h2 class="section-title" data-i18n="about.title"></h2>
        <div class="about-grid">
          <div class="about-text">
            <p data-i18n="about.p1"></p>
            <p data-i18n="about.p2"></p>
          </div>
          <ul class="highlights">
            <li data-i18n="about.h1"></li>
            <li data-i18n="about.h2"></li>
            <li><span data-i18n="about.h3"></span> <a class="hl-logo" href="https://bodygon.com" target="_blank" rel="noopener noreferrer" aria-label="Bodygon"><img src="./assets/img/bodygon-logo.svg" alt="Bodygon" loading="lazy" /></a></li>
            <li data-i18n="about.h4"></li>
          </ul>
        </div>
      </section>

      <!-- STORY (narrative) -->
      <section class="section story-band" id="story">
        <p class="kicker" data-i18n="story.kicker"></p>
        <h2 class="section-title" data-i18n="story.title"></h2>
        <div class="story">
          <p class="story-lead" data-i18n-html="story.lead"></p>

          <figure class="story-figure story-figure-thesis">
            <img src="./assets/img/thesis-cover.jpg" alt="Copertina della tesi di laurea «La forza e le sue espressioni nel pugilato dilettantistico»" loading="lazy" decoding="async" width="771" height="1100" />
            <figcaption data-i18n="story.capThesis"></figcaption>
          </figure>

          <p data-i18n-html="story.p1"></p>

          <figure class="story-figure">
            <img src="./assets/img/silvaggi-2009.jpg" alt="Emanuele d'Ambrosio con il prof. Nicola Silvaggi, Urbino 2009" loading="lazy" decoding="async" width="1100" height="825" />
            <figcaption data-i18n="story.capSilvaggi"></figcaption>
          </figure>

          <blockquote class="story-quote" data-i18n-html="story.quote"></blockquote>

          <h3 class="story-h" data-i18n="story.h2"></h3>
          <p data-i18n-html="story.p2"></p>

          <h3 class="story-h" data-i18n="story.h3"></h3>
          <p data-i18n-html="story.p3"></p>

          <figure class="story-figure">
            <button type="button" class="video-facade" data-video="./assets/media/gallipoli-2012-clip.mp4" aria-label="Play video">
              <img src="./assets/img/gallipoli-2012-poster.jpg" alt="Intervista a Emanuele d'Ambrosio dopo il seminario, Gallipoli 2012" loading="lazy" decoding="async" width="620" height="300" />
              <span class="play-icon" aria-hidden="true">▶</span>
            </button>
            <figcaption data-i18n="story.capGallipoli"></figcaption>
          </figure>

          <h3 class="story-h" data-i18n="story.h4"></h3>
          <p data-i18n-html="story.p4"></p>

          <h3 class="story-h" data-i18n="story.h5"></h3>
          <p data-i18n-html="story.p5"></p>
        </div>
      </section>

      <!-- EDUCATION -->
      <section class="section" id="education">
        <p class="kicker" data-i18n="credentials.kicker"></p>
        <h2 class="section-title" data-i18n="credentials.title"></h2>
        <ul class="edu-list" id="education-list"></ul>
      </section>

      <!-- EXPERIENCE -->
      <section class="section section-alt" id="experience">
        <p class="kicker" data-i18n="experience.kicker"></p>
        <h2 class="section-title" data-i18n="experience.title"></h2>
        <ul class="exp-list" id="experience-list"></ul>
      </section>

      <!-- SERVICES -->
      <section class="section" id="services">
        <p class="kicker" data-i18n="services.kicker"></p>
        <h2 class="section-title" data-i18n="services.title"></h2>
        <div class="cards">
          <article class="card"><h3 data-i18n="services.s1t"></h3><p data-i18n="services.s1d"></p></article>
          <article class="card"><h3 data-i18n="services.s2t"></h3><p data-i18n="services.s2d"></p></article>
          <article class="card"><h3 data-i18n="services.s3t"></h3><p data-i18n="services.s3d"></p></article>
          <article class="card"><h3 data-i18n="services.s4t"></h3><p data-i18n="services.s4d"></p></article>
        </div>
      </section>

      <!-- TEACHING -->
      <section class="section section-alt" id="teaching">
        <p class="kicker" data-i18n="teaching.kicker"></p>
        <h2 class="section-title" data-i18n="teaching.title"></h2>
        <ul class="bullet-list" id="teaching-list"></ul>
      </section>

      <!-- CONTINUING EDUCATION -->
      <section class="section" id="cpd">
        <p class="kicker" data-i18n="cpd.kicker"></p>
        <h2 class="section-title" data-i18n="cpd.title"></h2>
        <ul class="edu-list" id="cpd-list"></ul>
      </section>

      <!-- SPORTS -->
      <section class="section section-alt" id="sports">
        <p class="kicker" data-i18n="sports.kicker"></p>
        <h2 class="section-title" data-i18n="sports.title"></h2>
        <ul class="chip-list" id="sports-list"></ul>
      </section>

      <!-- BOOKS STUDIED -->
      <section class="section" id="books">
        <p class="kicker" data-i18n="books.kicker"></p>
        <h2 class="section-title" data-i18n="books.title"></h2>
        <p class="books-intro" data-i18n="books.intro"></p>
        <ul class="book-list" id="books-list"></ul>
      </section>

      <!-- BOOK -->
      <section class="section book-band" id="book">
        <p class="kicker" data-i18n="book.kicker"></p>
        <h2 class="section-title" data-i18n="book.title"></h2>
        <p class="book-text" data-i18n="book.text"></p>
        <p class="publisher">
          <span class="publisher-label" data-i18n="book.publisher"></span>
          <a class="logo-chip" data-link="book" href="#" target="_blank" rel="noopener noreferrer" aria-label="Calzetti & Mariucci">
            <img src="./assets/img/calzetti-mariucci.svg" alt="Calzetti & Mariucci" loading="lazy" width="160" height="70" />
          </a>
        </p>
        <a class="btn btn-primary" data-link="book" data-i18n="book.cta" href="#"></a>
      </section>

      <!-- NEWS -->
      <section class="section" id="news">
        <p class="kicker" data-i18n="news.kicker"></p>
        <h2 class="section-title" data-i18n="news.title"></h2>
        <article class="news-item">
          <h3 class="news-title" data-i18n="news.itemTitle"></h3>
          <p data-i18n="news.itemText"></p>

          <figure class="media">
            <!-- Click-to-play facade: the photo is the poster; the 18.7MB video
                 downloads only when the user clicks it. See main.js. -->
            <button type="button" class="video-facade" data-video="./assets/media/parisi-aos-clip.mp4" aria-label="Play video">
              <img
                src="./assets/img/parisi-aos-course.jpg"
                alt="Anatomy of Speed — Parisi certification course"
                loading="lazy"
                decoding="async"
                width="1280"
                height="888"
              />
              <span class="play-icon" aria-hidden="true">▶</span>
            </button>
            <figcaption data-i18n="news.captionPhoto"></figcaption>
          </figure>

          <figure class="media media-portrait">
            <img src="./assets/img/parisi-dedication.jpg" alt="Dedica autografa di Bill Parisi" loading="lazy" decoding="async" />
            <figcaption data-i18n="news.captionDedication"></figcaption>
          </figure>
        </article>
      </section>

      <!-- CONTACT -->
      <section class="section section-alt" id="contact">
        <p class="kicker" data-i18n="contact.kicker"></p>
        <h2 class="section-title" data-i18n="contact.title"></h2>
        <p class="contact-text" data-i18n="contact.text"></p>
        <p class="contact-where" data-i18n="contact.location"></p>
        <a class="btn btn-primary" id="contact-email" href="#" data-i18n="contact.emailLabel"></a>
      </section>
    </main>

    <footer class="footer">
      <span class="footer-note" data-i18n="footer.note"></span>
      <span class="footer-copy">© <span id="year"></span> Emanuele d'Ambrosio</span>
    </footer>

    <script src="./assets/js/content.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
