<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- TODO(launch): remove this noindex once the site has real content. -->
    <meta name="robots" content="noindex" />

    <title>Emanuele D'Ambrosio</title>
    <meta name="description" content="" data-i18n-meta="seo.description" />

    <!-- Bilingual: declare both locales for search engines. -->
    <link rel="alternate" hreflang="it" href="./?lang=it" />
    <link rel="alternate" hreflang="en" href="./?lang=en" />
    <link rel="alternate" hreflang="x-default" href="./" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Open Graph (basic) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Emanuele D'Ambrosio" />
    <meta property="og:description" content="" data-i18n-meta="seo.description" />

    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a class="brand" href="./" aria-label="Emanuele D'Ambrosio">ED</a>
      <nav class="lang" aria-label="Language switch">
        <button type="button" data-lang="it">IT</button>
        <span class="lang-sep" aria-hidden="true">/</span>
        <button type="button" data-lang="en">EN</button>
      </nav>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow" data-i18n="hero.eyebrow"></p>
        <h1 class="hero-name" data-i18n="hero.name"></h1>
        <p class="hero-tagline" data-i18n="hero.tagline"></p>
        <p class="hero-intro" data-i18n="hero.intro"></p>
        <div class="cta-row">
          <a class="btn btn-primary" data-link="book" data-i18n="hero.ctaBook" href="#"></a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span class="footer-note" data-i18n="footer.note"></span>
      <span class="footer-copy">© <span id="year"></span> Emanuele D'Ambrosio</span>
    </footer>

    <script src="./assets/js/content.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
